<!DOCTYPE html>
<html>
<head>
  <title>Privacy Request Form</title>
</head>
<body>

<h2>Privacy Request</h2>

<form id="privacyForm">

  <label>Email:</label><br>
  <input type="email" id="email" required><br><br>

  <label>Account No:</label><br>
  <input type="text" id="account_no"><br><br>

  <label>First Name:</label><br>
  <input type="text" id="first_name"><br><br>

  <label>Last Name:</label><br>
  <input type="text" id="last_name"><br><br>

  <label>Request Subject:</label><br>
  <input type="text" id="subject"><br><br>

  <label>Request Details:</label><br>
  <textarea id="details"></textarea><br><br>

  <button type="submit">Submit</button>

</form>

<script>
document.getElementById("privacyForm").addEventListener("submit", async function(e) {
  e.preventDefault();

const formData = {
  ticket_type: ["ACCESS"], // try uppercase
  user_type: "customer",
  email: document.getElementById("email").value,
  qid: "NA",
  account_no: document.getElementById("account_no").value,
  first_name: document.getElementById("first_name").value,
  last_name: document.getElementById("last_name").value,
  dob: null,
  phone: "",
  request_subject: document.getElementById("subject").value,
  request_details: document.getElementById("details").value,
  attachments: [],
  additionalCustomCheckbox: false
};

fetch("https://privacy-central.securiti.ai/integration/v1/request-submission", {
  method: "POST",
  headers: {
    "Content-Type": "application/json"
"X-TIDENT" : "ac148030-769c-49c3-95d9-312b84bb140d",
                  "X-API-KEY" : "Z6d64bidM5ENe8FOq6kdPEvTLpv2QxHlGnov93i5",
                  "X-API-SECRET": "16O8w0aNxEr2TzqBybKEJ4Z218mTEwyfm4YicrZk"
  },
  body: JSON.stringify({
    form_data: JSON.stringify(formData)
  })
})
.then(res => res.json())
.then(data => {
  console.log("Response:", data);
  alert(JSON.stringify(data));
})
.catch(err => console.error(err));
</script>

</body>
</html>
