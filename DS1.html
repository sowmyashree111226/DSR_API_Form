<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Request Form</title>
</head>
<body>
    <h1>Data Request Form</h1>
    <form id="dataRequestForm">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" required><br><br>
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required><br><br>
       

        <input type="submit" value="Submit">
    </form>

    <script>
        document.getElementById('dataRequestForm').addEventListener('submit', function (event) {
            event.preventDefault(); // Prevent the default form submission
            const formData = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value
            };

            // Properly structure JSON payload
            const jsonPayload = JSON.stringify(formData);

            // Example of sending data with fetch
            fetch('https://privacy-central.securiti.ai/integration/v1/request-submission', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-TIDENT' : 'ac148030-769c-49c3-95d9-312b84bb140d',
                    'X-API-KEY' : 'Z6d64bidM5ENe8FOq6kdPEvTLpv2QxHlGnov93i5',
                    'X-API-SECRET' : '16O8w0aNxEr2TzqBybKEJ4Z218mTEwyfm4YicrZk'
                },
                body: jsonPayload
            })
            .then(response => response.json())
            .then(data => {
                console.log('Success:', data);
                // Handle successful response
            })
            .catch((error) => {
                console.error('Error:', error);
                // Handle error response
            });
        });
    </script>
</body>
</html>
